<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVServer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Login Page -->
        <div id="login-page" class="page active">
            <div class="login-container">
                <h1>KVServer</h1>
                <p class="subtitle">Secure Key-Value Storage</p>
                <form id="login-form">
                    <div class="form-group">
                        <label for="access-token">Access Token</label>
                        <input type="password" id="access-token" required
                               placeholder="Enter your storage access token">
                    </div>
                    <div id="login-error" class="login-error" style="display:none"></div>
                    <button type="submit" class="btn-primary">Open Storage</button>
                </form>
            </div>
        </div>

        <!-- Dashboard Page -->
        <div id="dashboard-page" class="page">
            <nav class="navbar">
                <div class="nav-brand">
                    KVServer<span id="storage-name" class="nav-storage-name" style="display:none"></span>
                </div>
                <div class="nav-actions">
                    <!-- Animated theme toggle -->
                    <button id="theme-toggle" class="theme-switch" title="Toggle dark mode">
                        <img src="svg/sun.svg"  class="ts-icon ts-sun"  alt="">
                        <div class="ts-handle"></div>
                        <img src="svg/moon.svg" class="ts-icon ts-moon" alt="">
                    </button>
                    <button id="logout-btn" class="btn-icon" title="Close Storage">
                        <img src="svg/logout.svg" class="icon" alt="Close Storage">
                    </button>
                </div>
            </nav>

            <div class="container">
                <div class="toolbar">
                    <h2>Key-Value Pairs</h2>
                    <div class="toolbar-actions">
                        <button id="create-key-btn" class="btn-primary btn-with-icon">
                            <img src="svg/add.svg" class="icon icon-btn" alt=""> Create New Key
                        </button>
                        <button id="refresh-btn" class="btn-icon" title="Refresh">
                            <img src="svg/refresh.svg" class="icon" alt="Refresh">
                        </button>
                    </div>
                </div>

                <div class="search-bar">
                    <img src="svg/search.svg" class="search-icon icon" alt="">
                    <input type="text" id="search-keys" placeholder="Search keys…" autocomplete="off">
                </div>

                <div id="key-list" class="key-list">
                    <!-- Keys will be rendered here -->
                </div>
                <div id="pagination" class="pagination" style="display:none"></div>

                <!-- Code Samples Section -->
                <div class="code-samples-section">
                    <h3>API Code Samples</h3>
                    <p class="subtitle">Use these code snippets to integrate KVServer with your applications</p>

                    <div class="code-samples-controls">
                        <div class="control-group">
                            <label for="language-select">Language:</label>
                            <select id="language-select">
                                <option value="javascript">JavaScript</option>
                                <option value="python">Python</option>
                                <option value="curl">cURL</option>
                                <option value="csharp">C#</option>
                                <option value="go">Go</option>
                            </select>
                        </div>
                    </div>

                    <div class="code-sample">
                        <div class="code-header">
                            <span id="code-title">JavaScript - Read Value</span>
                            <button id="copy-code-btn" class="btn-small btn-with-icon">
                                <img src="svg/copy.svg" class="icon icon-btn" alt=""> Copy
                            </button>
                        </div>
                        <div class="code-body">
                            <div id="code-line-numbers" class="code-line-numbers"></div>
                            <pre id="code-pre"><code id="code-content">// Code sample will appear here</code></pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Key Editor Modal -->
        <div id="key-editor-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Create Key</h2>
                    <button class="close-btn" onclick="closeModal()">&times;</button>
                </div>
                <form id="key-form">
                    <div class="form-group">
                        <label for="key-name">Key Name</label>
                        <input type="text" id="key-name" required
                               placeholder="Enter key name">
                    </div>
                    <div class="form-group">
                        <label for="key-value">Value</label>
                        <div class="editor-container">
                            <div id="line-numbers" class="line-numbers"></div>
                            <textarea id="key-value" required
                                      placeholder="Enter value"
                                      rows="5"
                                      spellcheck="false"></textarea>
                        </div>
                    </div>
                </form>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" form="key-form" class="btn-primary">Save</button>
                </div>
            </div>
        </div>

        <!-- History Viewer Modal -->
        <div id="history-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Version History</h2>
                    <button class="close-btn" onclick="closeHistoryModal()">&times;</button>
                </div>
                <div id="history-content">
                    <!-- History will be rendered here -->
                </div>
            </div>
        </div>

        <!-- Confirm Modal -->
        <div id="confirm-modal" class="modal">
            <div class="modal-content modal-content-sm">
                <div class="modal-header">
                    <h2 id="confirm-title">Confirm</h2>
                </div>
                <div class="confirm-body">
                    <p id="confirm-message"></p>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="confirm-cancel">Cancel</button>
                    <button type="button" class="btn-danger"    id="confirm-ok">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Load JavaScript files in correct order -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/codeSamples.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
